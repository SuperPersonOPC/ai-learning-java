spring:
  application:
    name: spring-ai-module
  ai:
    openai:
      # Use a non-empty fallback so local startup does not fail
      # when OPENAI_API_KEY is not provided.
      api-key: ${OPENAI_API_KEY:disabled}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

server:
  port: 8080
